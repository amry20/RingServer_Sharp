# =============================================================================
# Sysctl tuning for ringserver SeedLink — SHARED-SYSTEM profile
# =============================================================================
# Target:   Raspberry Pi Compute Module 4 — 2 GB RAM
# Hardware: BCM2711, 2 GB LPDDR4, Gigabit Ethernet
# Scenario: ringserver + OTHER applications running simultaneously
#           (e.g., web server, data processing, monitoring, SSH, etc.)
#
# Install:  sudo cp sysctl-tuning.conf /etc/sysctl.d/99-ringserver.conf
#           sudo sysctl -p /etc/sysctl.d/99-ringserver.conf
#
# ┌─────────────────────────────────────────────────────────────┐
# │ MEMORY BUDGET — 2 GB shared system                         │
# ├─────────────────────────────────┬───────────────────────────┤
# │ Component                       │ Allocation                │
# ├─────────────────────────────────┼───────────────────────────┤
# │ Kernel + OS base                │ ~250 MB                   │
# │ ringserver ring buffer (mmap)   │  256 MB (configurable)    │
# │ ringserver send buffers         │  150 MB (300 × 512 KB)    │
# │ ringserver recv buffers         │   19 MB (300 × 64 KB)     │
# │ ringserver thread stacks        │   75 MB (300 × 256 KB)    │
# │ ringserver subtotal             │ ~500 MB                   │
# │ ─────────────────────────────── │ ───────────────────────── │
# │ Reserved for OTHER applications │ ~750 MB                   │
# │ File cache / headroom           │ ~500 MB                   │
# ├─────────────────────────────────┼───────────────────────────┤
# │ TOTAL                           │ ~2000 MB                  │
# └─────────────────────────────────┴───────────────────────────┘
#
# ⚠  ringserver capped at ~500 MB, leaving ~750 MB for other apps.
#    Adjust MaxClients in ring.conf if other apps need more memory.
# =============================================================================

# =============================================================================
# SECTION 1: Socket buffer limits
# =============================================================================
# These are SYSTEM-WIDE maximums — affect ALL applications using sockets.
# Set conservatively so other apps (web server, etc.) aren't starved.
#
# ringserver requests SO_SNDBUF=512KB per client.
# Kernel allocates 2× (sk_sndbuf = 2 × SO_SNDBUF), so wmem_max >= 1 MB.
# Other apps using default buffers are unaffected (they don't call setsockopt
# with values this large).
net.core.wmem_max = 1048576
net.core.rmem_max = 262144

# Default socket buffer sizes — used by ALL apps that don't set their own.
# Keep close to Raspbian defaults (212992) so other apps behave normally.
# Slightly raised for better general networking on Gigabit.
net.core.wmem_default = 212992
net.core.rmem_default = 212992

# =============================================================================
# SECTION 2: Connection backlog
# =============================================================================
# somaxconn is SYSTEM-WIDE — applies to all listening sockets.
# 512 is a balanced value: handles ringserver burst reconnects without
# consuming excessive kernel memory that other services might need.
net.core.somaxconn = 512

# SYN backlog — half-open connections waiting to complete handshake.
# Match somaxconn. Other apps benefit from this too.
net.ipv4.tcp_max_syn_backlog = 512

# =============================================================================
# SECTION 3: TCP tuning (safe for all apps)
# =============================================================================
# These are all safe for shared systems — they improve general TCP behavior.

# Allow reuse of TIME_WAIT sockets for new connections.
# Safe: only reuses when new timestamp > old. Benefits all apps.
net.ipv4.tcp_tw_reuse = 1

# Reduce FIN_WAIT2 timeout from 60s to 20s.
# Slightly less aggressive than single-app (15s) to be safe for other services.
net.ipv4.tcp_fin_timeout = 20

# Window scaling — already default on modern kernels, ensure it's on.
net.ipv4.tcp_window_scaling = 1

# Ancillary buffer space — small bump, negligible memory impact.
net.core.optmem_max = 32768

# =============================================================================
# SECTION 4: TCP memory pressure — CRITICAL for shared system!
# =============================================================================
# tcp_mem is the global TCP memory governor (in PAGES, 1 page = 4 KiB).
# It limits TOTAL memory used by ALL TCP sockets across ALL applications.
#
# On a shared 2 GB system, we must cap TCP to prevent it from starving
# other apps. Budget: TCP gets max ~128 MB out of 2048 MB.
#
# min      = 4096  pages =  16 MB — normal operation, no throttling
# pressure = 8192  pages =  32 MB — kernel starts pushing back
# max      = 32768 pages = 128 MB — hard ceiling, drops begin
#
# This means ringserver + all other apps combined can use at most 128 MB
# of TCP buffer memory. ringserver at 300 clients ≈ ~100 MB send buffers,
# leaving ~28 MB for other apps' TCP connections.
net.ipv4.tcp_mem = 4096 8192 32768

# Per-socket TCP auto-tuning (bytes): min / default / max
# These constrain individual sockets within the tcp_mem budget.
# Write: max 512 KB per socket — matches ringserver SO_SNDBUF.
# Read:  max 128 KB per socket — generous for receiving apps too.
net.ipv4.tcp_wmem = 4096 65536 524288
net.ipv4.tcp_rmem = 4096 65536 131072

# =============================================================================
# SECTION 5: Virtual memory — balanced for shared system
# =============================================================================
# swappiness: 0=never swap, 100=swap aggressively.
# 30 is balanced: ringserver's mmap'd ring benefits from staying in RAM,
# but other apps can still use swap if they're idle. Pure 10 would be
# too aggressive on a shared system and could OOM other apps.
vm.swappiness = 30

# Keep minimum free memory.  On 2 GB shared system, keep 8 MB free.
# This is a safety net for all apps, prevents OOM killer under burst.
# Not too high — other apps need the memory.
vm.min_free_kbytes = 8192

# Dirty page thresholds — when kernel writes dirty pages to disk.
# Conservative values for SD card / eMMC:
# 15% dirty_ratio means sync writes start when 15% of RAM is dirty (~300 MB).
# 5% background_ratio means background flushing starts at ~100 MB.
# These are safe defaults that benefit all I/O-heavy apps.
vm.dirty_ratio = 15
vm.dirty_background_ratio = 5

# =============================================================================
# SECTION 6: File descriptor limits
# =============================================================================
# MaxClients=300 for ringserver + other apps need fds too.
# 32768 is generous without being wasteful on 2 GB system.
# Each fd costs ~1 KB kernel memory, so 32768 ≈ 32 MB worst case.
#
# Per-process limits in /etc/security/limits.conf:
#   ringserver  soft  nofile  4096
#   ringserver  hard  nofile  4096
#   # Leave default (1024) for other apps unless they need more.
fs.file-max = 32768
